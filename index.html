<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">GitHub Finder</div>
  </nav>

  <main class="app">
    <section class="hero">
      <h1>Search GitHub Users</h1>
      <p class="description">
        Enter a username to fetch a user profile and repos
      </p>

      <form id="search-form" class="search-form">
        <label for="username-input">GitHub username</label>
        <div class="search-row">
          <input
            id="username-input"
            type="text"
            placeholder="예: octocat"
            autocomplete="off"
          >
          <button type="submit">검색</button>
        </div>
      </form>

      <p id="message" class="message" role="status"></p>
    </section>

    <section id="profile-section" class="profile-section hidden" aria-live="polite">
      <article class="profile-card">
        <div class="profile-left">
          <img id="avatar" class="avatar" src="" alt="">
          <a id="profile-link" class="profile-link" href="#" target="_blank" rel="noopener noreferrer">
            View Profile
          </a>
        </div>

        <div class="profile-info">
          <div class="stats">
            <span class="badge badge-blue">Public Repos: <strong id="public-repos"></strong></span>
            <span class="badge badge-gray">Public Gists: <strong id="public-gists"></strong></span>
            <span class="badge badge-green">Followers: <strong id="followers"></strong></span>
            <span class="badge badge-cyan">Following: <strong id="following"></strong></span>
          </div>

          <ul class="info-list">
            <li>Company: <span id="profile-company"></span></li>
            <li>Website/Blog: <a id="profile-blog" href="#" target="_blank" rel="noopener noreferrer"></a></li>
            <li>Location: <span id="profile-location"></span></li>
            <li>Member Since: <span id="member-since"></span></li>
          </ul>
        </div>
      </article>
    </section>

    <section id="repos-section" class="repos-section hidden">
      <div class="section-title">
        <h2>Latest Repos</h2>
        <span id="repo-count"></span>
      </div>
      <div id="repo-list" class="repo-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
